name: Daily Stooq Data Download
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance --break-system-packages

      - name: Download Index Data
        run: |
          python3 << 'EOF'
          import yfinance as yf
          import sys

          tickers = {
              "roem 2.0/Financial Markets/BET index.csv": "^BET.RO",
              "roem 2.0/Financial Markets/SSEC.csv":      "^SSEC",
          }

          for path, ticker in tickers.items():
              print(f"\nDownloading {ticker}...")
              df = yf.download(ticker, period="max", interval="1d", auto_adjust=True)

              if df.empty:
                  print(f"ERROR: No data returned for {ticker}")
                  sys.exit(1)

              df.columns = [col[0] if isinstance(col, tuple) else col for col in df.columns]
              df.index.name = "Date"
              df.to_csv(path)

              print(f"Rows: {len(df)}")
              print(df.tail(3))
              print(f"Saved to: {path}")

          print("\nAll downloads complete.")
          EOF

      - name: Validate Downloads
        run: |
          for f in "roem 2.0/Financial Markets/BET index.csv" "roem 2.0/Financial Markets/SSEC.csv"; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty or missing"
              exit 1
            fi
            echo "--- $f ---"
            echo "Size: $(wc -c < "$f") bytes"
            head -3 "$f"
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "roem 2.0/Financial Markets/BET index.csv"
          git add "roem 2.0/Financial Markets/SSEC.csv"

          git diff --quiet && git diff --staged --quiet || (git commit -m "Update BET and SSEC Index: $(date +'%Y-%m-%d')" && git push)
