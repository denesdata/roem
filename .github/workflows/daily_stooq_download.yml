name: Daily Stooq Data Download
on:
  schedule:
    # 02:00 UTC is 04:00 AM Bucharest
    - cron: '0 2 * * *'
  workflow_dispatch: 
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Index Data
        run: |
          mkdir -p "roem 2.0/Financial Markets"

          # Download BET and show HTTP status
          HTTP_BET=$(curl -L "https://stooq.com/q/d/l/?s=^bet&i=d" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            -H "Referer: https://stooq.com/" \
            -w "%{http_code}" \
            -o "roem 2.0/Financial Markets/BET index.csv")
          echo "BET HTTP status: $HTTP_BET"
          echo "BET file size: $(wc -c < 'roem 2.0/Financial Markets/BET index.csv') bytes"
          echo "BET file content preview:"
          head -5 "roem 2.0/Financial Markets/BET index.csv"

          sleep 5

          # Download SSEC and show HTTP status
          HTTP_SSEC=$(curl -L "https://stooq.com/q/d/l/?s=^shc&i=d" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            -H "Referer: https://stooq.com/" \
            -w "%{http_code}" \
            -o "roem 2.0/Financial Markets/SSEC.csv")
          echo "SSEC HTTP status: $HTTP_SSEC"
          echo "SSEC file size: $(wc -c < 'roem 2.0/Financial Markets/SSEC.csv') bytes"
          echo "SSEC file content preview:"
          head -5 "roem 2.0/Financial Markets/SSEC.csv"

      - name: Validate Downloads
        run: |
          for f in "roem 2.0/Financial Markets/BET index.csv" "roem 2.0/Financial Markets/SSEC.csv"; do
            echo "--- $f ---"
            echo "Size: $(wc -c < "$f") bytes"
            cat "$f"
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "roem 2.0/Financial Markets/BET index.csv"
          git add "roem 2.0/Financial Markets/SSEC.csv"

          git diff --quiet && git diff --staged --quiet || (git commit -m "Update BET and SSEC Index: $(date +'%Y-%m-%d')" && git push)
