name: Daily Stooq Data Download
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Index Data
        run: |
          python3 << 'EOF'
          import requests
          import time
          import sys

          session = requests.Session()

          # First visit the main page to get cookies, like a real browser would
          print("Visiting Stooq homepage to get cookies...")
          session.get("https://stooq.com/", headers={
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          })
          print(f"Cookies received: {dict(session.cookies)}")
          time.sleep(3)

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.5",
              "Referer": "https://stooq.com/",
          }

          files = {
              "roem 2.0/Financial Markets/BET index.csv": "https://stooq.com/q/d/l/?s=^bet&i=d",
              "roem 2.0/Financial Markets/SSEC.csv":      "https://stooq.com/q/d/l/?s=^shc&i=d",
          }

          for path, url in files.items():
              print(f"\nDownloading: {url}")
              r = session.get(url, headers=headers)
              print(f"Status: {r.status_code}")
              print(f"Content-Type: {r.headers.get('Content-Type')}")
              print(f"Content-Length: {len(r.content)} bytes")
              print(f"Preview: {r.text[:300]}")

              if r.status_code != 200 or len(r.content) == 0:
                  print(f"ERROR: Failed to download {path}")
                  sys.exit(1)

              with open(path, "wb") as f:
                  f.write(r.content)
              print(f"Saved to {path}")
              time.sleep(3)

          print("\nAll downloads complete.")
          EOF

      - name: Validate Downloads
        run: |
          for f in "roem 2.0/Financial Markets/BET index.csv" "roem 2.0/Financial Markets/SSEC.csv"; do
            echo "--- $f ---"
            echo "Size: $(wc -c < "$f") bytes"
            head -3 "$f"
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "roem 2.0/Financial Markets/BET index.csv"
          git add "roem 2.0/Financial Markets/SSEC.csv"

          git diff --quiet && git diff --staged --quiet || (git commit -m "Update BET and SSEC Index: $(date +'%Y-%m-%d')" && git push)
