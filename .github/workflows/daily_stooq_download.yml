name: Daily Stooq Data Download
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance --break-system-packages

      - name: Download Index Data
        run: |
          python3 << 'EOF'
          import yfinance as yf
          import pandas as pd
          import sys
          import os

          tickers = {
              "roem 2.0/Financial Markets/BET index.csv": ("^BET.RO", "5d"),
              "roem 2.0/Financial Markets/SSEC.csv":      ("^SSEC",   "max"),
          }

          for path, (ticker, period) in tickers.items():
              print(f"\nDownloading {ticker} (period={period})...")
              df = yf.download(ticker, period=period, interval="1d", auto_adjust=True)

              if df.empty:
                  print(f"ERROR: No data returned for {ticker}")
                  sys.exit(1)

              # Flatten multi-level columns if present
              df.columns = [col[0] if isinstance(col, tuple) else col for col in df.columns]
              df.index.name = "Date"

              # If file exists, append only new rows
              if os.path.exists(path) and os.path.getsize(path) > 0:
                  existing = pd.read_csv(path, index_col="Date", parse_dates=True)
                  combined = pd.concat([existing, df])
                  combined = combined[~combined.index.duplicated(keep="last")]
                  combined.sort_index(inplace=True)
                  combined.to_csv(path)
                  print(f"Appended new rows. Total rows: {len(combined)}")
              else:
                  df.to_csv(path)
                  print(f"Created new file. Rows: {len(df)}")

              print(df.tail(3))

          print("\nAll downloads complete.")
          EOF

      - name: Validate Downloads
        run: |
          for f in "roem 2.0/Financial Markets/BET index.csv" "roem 2.0/Financial Markets/SSEC.csv"; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty or missing"
              exit 1
            fi
            echo "--- $f ---"
            echo "Size: $(wc -c < "$f") bytes"
            head -3 "$f"
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "roem 2.0/Financial Markets/BET index.csv"
          git add "roem 2.0/Financial Markets/SSEC.csv"

          git diff --quiet && git diff --staged --quiet || (git commit -m "Update BET and SSEC Index: $(date +'%Y-%m-%d')" && git push)
