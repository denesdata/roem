name: Update Financial Market Indexes
on:
  schedule:
    - cron: "5 16 * * 1-5"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance
      - run: python fetch_financialMarkets.py
      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "roem 2.0/Financial Markets/BET index.csv" "roem 2.0/Financial Markets/SSEC.csv"
          git diff --cached --quiet || git commit -m "chore: update financial markets $(date -u +'%Y-%m-%d')"
          git push
